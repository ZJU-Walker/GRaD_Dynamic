params:
  diff_env:
    name: ExpertDroneEnv
    stochastic_env: True
    episode_length: 800
    MM_caching_frequency: 16

  network:
    actor: ActorStochasticMLP
    actor_mlp:
      units: [256, 128, 64]
      activation: elu

    critic: CriticMLP
    critic_mlp:
      units: [256, 128, 64]
      activation: elu

  vae:
    kl_weight: 1.0
    encoder_units: [256, 256, 256]
    decoder_units: [32, 64, 128, 256]

  env_hyper:
    SINGLE_VISUAL_INPUT_SIZE: 16
    HISTORY_BUFFER_NUM: 5
    LATENT_VECT_NUM: 24

  config:
    name: gradnav_test
    map_name: gate_mid
    actor_learning_rate: 1e-4
    critic_learning_rate: 1e-4
    vae_learning_rate: 5e-4
    lr_schedule: cosine # ['constant', 'linear', 'cosine']
    target_critic_alpha: 0.2
    obs_rms: True
    ret_rms: False
    critic_iterations: 16
    critic_method: td-lambda # ['td-lambda', 'one-step']
    lambda: 0.95
    num_batch: 4
    gamma: 0.99
    betas: [0.7, 0.95]
    steps_num: 32
    grad_norm: 1.0
    truncate_grads: True
    num_actors: 128
    save_interval: 50
    max_epochs: 800
    domain_randomization: True
    rew_scale: 1.0

    LPF_train: True
    LPF_val: 0.5

    player:
      determenistic: True
      games_num: 1
      num_actors: 1
      print_stats: True
      LPF_eval: True
      LPF_val: 0.5