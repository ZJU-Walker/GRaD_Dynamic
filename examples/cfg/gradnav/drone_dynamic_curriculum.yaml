params:
  diff_env:
    name: DynamicDroneEnv
    stochastic_env: True
    episode_length: 300
    MM_caching_frequency: 16

  # Dynamic obstacle configuration
  dynamic_objects:
    enabled: true
    max_objects_per_env: 1
    collision_threshold: 0.1
    # Reward params: dynamic_obst_threshold, dynamic_obst_strength in env_utils/config.py

    # Camera parameters (must match GS render resolution 0.4)
    camera_params:
      fx: 128.0    # 320 * 0.4
      fy: 128.0    # 320 * 0.4
      cx: 128.0    # 320 * 0.4
      cy: 72.0     # 180 * 0.4
      width: 256   # 640 * 0.4
      height: 144  # 360 * 0.4

    # List of objects to spawn (red box for Phase 2)
    # Uses 'trajectories' list for random selection during training
    objects:
      - type: box
        box_size: [1.0, 1.0, 0.05]   # width, height, depth (cube)
        velocity: [0.15, 0.0, 0.0]  # Slow: 0.0-0.3 m/s
        box_rotation: [0, 0.7071, 0, 0.7071]
        # Random trajectory selection for better generalization
        trajectories:
          # - "/home/irislab/ke/GRaD_Dynamic_onboard/envs/assets/trajectories/box.csv"
          # - "/home/irislab/ke/GRaD_Dynamic_onboard/envs/assets/trajectories/box_1.csv"
          # - "/home/irislab/ke/GRaD_Dynamic_onboard/envs/assets/trajectories/box_2.csv"
          # - "/home/irislab/ke/GRaD_Dynamic_onboard/envs/assets/trajectories/box_3.csv"
          # - "/home/irislab/ke/GRaD_Dynamic_onboard/envs/assets/trajectories/box_4.csv"
          - "/home/irislab/ke/GRaD_Dynamic_onboard/envs/assets/trajectories/box_5.csv"
          # - "/home/irislab/ke/GRaD_Dynamic_onboard/envs/assets/trajectories/box_6.csv"
        loop: true
        eval_time_offset: 0.0   # Uncomment for eval: fixed trajectory start time (seconds)

  # Curriculum learning configuration
  curriculum:
    enabled: true
    phase1_end_iter: 50           # Phase 1: iter 0-200 (static only)
    # Phase 2 ramping schedule: [start_iter, spawn_probability]
    # Spawn probability applies from start_iter until the next threshold
    phase2_schedule:
      - [30, 0.3]                 # iter 200+: 30% spawn probability
      - [50, 0.7]                 # iter 300+: 70% spawn probability
      - [80, 1.0]                 # iter 400+: 100% spawn probability

  vel_net:
    checkpoint_path: "/home/irislab/ke/GRaD_Dynamic_onboard/checkpoints/vel_net_from_sim_v2/best.pt"
    enabled: true                  # Disabled - use GT velocity only
    vel_frame: "world"              # "body" for body frame velocity, "world" for world frame velocity
                                    # Affects policy observations (even when vel_net disabled)
    eval_compare: true
    finetune: false                 # Set true if you want to finetune vel_net during policy training
    finetune_start_iter: 200
    learning_rate: 1e-4
    finetune_encoder: false

    # GT→pred velocity curriculum (only used when enabled: true and use_pred_vel_in_obs: true)
    use_pred_vel_in_obs: false    # Enable using predicted velocity in policy observations
    gt_vel_curriculum_start_iter: 0      # Start curriculum at iteration 0
    gt_vel_curriculum_end_iter: 200      # End curriculum at iteration 200
    gt_vel_ratio_start: 1.0              # Start with 100% GT velocity
    gt_vel_ratio_end: 0.0                # End with 0% GT (100% predicted)

  network:
    actor: ActorStochasticMLP
    actor_mlp:
      units: [256, 128, 64]
      activation: elu

    critic: CriticMLP
    critic_mlp:
      units: [256, 128, 64]
      activation: elu

  vae:
    kl_weight: 1.0
    encoder_units: [256, 256, 256]
    decoder_units: [32, 64, 128, 256]

  env_hyper:
    SINGLE_VISUAL_INPUT_SIZE: 16
    HISTORY_BUFFER_NUM: 5
    LATENT_VECT_NUM: 24

  config:
    name: gradnav_dynamic_curriculum
    map_name: gate_mid_new
    actor_learning_rate: 1e-4
    critic_learning_rate: 1e-4
    vae_learning_rate: 5e-4
    lr_schedule: cosine
    target_critic_alpha: 0.2
    obs_rms: True
    ret_rms: False
    critic_iterations: 16
    critic_method: td-lambda
    lambda: 0.95
    num_batch: 4
    gamma: 0.99
    betas: [0.7, 0.95]
    steps_num: 32
    grad_norm: 1.0
    truncate_grads: True
    num_actors: 64
    save_interval: 50
    max_epochs: 1000               # 200 (Phase 1) + 600 (Phase 2)
    domain_randomization: True
    rew_scale: 1.0

    LPF_train: True
    LPF_val: 0.5

    player:
      determenistic: True
      games_num: 1
      num_actors: 1
      print_stats: True
      LPF_eval: True
      LPF_val: 0.5
