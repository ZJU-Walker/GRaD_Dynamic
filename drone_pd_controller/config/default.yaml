# Default Configuration for Drone PD Controller Navigation
# This config controls the waypoint navigation behavior

# Environment settings
environment:
  map_name: gate_mid  # Options: gate_mid, gate_left, gate_right, simple_hover
  device: cuda:0
  num_envs: 1
  episode_length: 2000
  render_resolution: 1.0  # 1.0 = full 640x360, 0.5 = 320x180, etc.

# Simulation parameters
simulation:
  sim_freq: 50.0  # Hz
  control_freq: 50.0  # Hz
  frame_interval: 2  # Record frame every N steps

# Drone physical parameters
drone:
  mass: 1.15  # kg
  max_thrust: 25.0  # N
  inertia: [0.01, 0.012, 0.025]  # Diagonal inertia matrix

# PD Controller gains
controller:
  kp_xy: 0.3  # Proportional gain for XY position
  kp_z: 0.2   # Proportional gain for Z position
  kd_xy: 0.1  # Derivative gain for XY velocity
  kd_z: 0.1   # Derivative gain for Z velocity
  rate_limit: 0.2  # Maximum body rate command
  thrust_min: 0.3  # Minimum thrust command
  thrust_max: 0.7  # Maximum thrust command

# Path planning parameters
path_planning:
  safety_distance: 0.15  # Safety margin around obstacles (m)
  wp_distance: 2.0  # Distance between resampled waypoints (m)
  voxel_size: 0.1  # Voxel size for occupancy grid (m)

# Waypoint following parameters
waypoint_following:
  waypoint_threshold: 0.5  # Distance to consider waypoint reached (m)
  max_steps: 2000  # Maximum simulation steps

# Video output settings
video:
  fps: 20
  output_dir: output
  codec: avc1  # H.264 codec for VS Code compatibility (fallback: h264, x264, mp4v)

# Map-specific waypoints (used when no custom waypoints provided)
maps:
  gate_mid:
    start: [-6.0, 0.0, 1.25]
    destination: [7.0, -2.0, 1.3]
    waypoints:
      - [-0.2, -0.1, 1.4]
      - [1.6, 0.7, 1.1]
      - [3.7, 1.5, 0.7]
      - [5.8, 0.0, 1.2]

  gate_left:
    start: [-6.0, 0.0, 1.2]
    destination: [7.0, -2.0, 1.2]
    waypoints:
      - [-0.2, 1.2, 1.4]
      - [3.7, 1.2, 0.6]
      - [5.8, 0.0, 1.2]

  gate_right:
    start: [-6.0, 0.0, 1.3]
    destination: [7.0, -2.0, 1.3]
    waypoints:
      - [-3.0, -1.0, 1.3]
      - [0.0, -1.4, 1.5]
      - [1.8, 0.6, 1.1]
      - [3.7, 1.4, 0.7]
      - [5.8, 0.0, 1.3]

  simple_hover:
    start: [-6.0, 0.0, 1.2]
    destination: [-6.0, 0.0, 1.2]
    waypoints: []
